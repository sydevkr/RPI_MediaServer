# RPI_MediaServer Configuration

# Video Mode (1=MIXING_2X2, 2=ONLY_HDMI, 3=ONLY_CSI, 4=ONLY_USB, 5=ONLY_SCREEN_WAYLAND, 6=PIP_FB_RIGHT_TOP)
video_mode=1

# Input devices
hdmi_device=/dev/video0
csi_device=/dev/video1
usb_device=/dev/video0
fb_device=

# Wayland screen capture settings
# Mode 5 uses wf-recorder -> RTSP publish -> MediaMTX WebRTC/HLS
# fb_device is legacy only and is ignored in mode 5
fb_width=1920
fb_height=1080

# Output resolution
width=320
height=240
fps=30
show_input_labels=true
show_wallclock_overlay=true

# Encoding
codec=libx264
bitrate=2000000
gop_size=15

# Streaming
rtsp_url=rtsp://10.1.119.31:8554/live
wf_recorder_path=/usr/bin/wf-recorder
wayland_display=
xdg_runtime_dir=

# AI Model
ai_model=/usr/share/hailo-models/yolov8s_person.hef
confidence_threshold=0.5

# Logging (0=Debug, 1=Info, 2=Warning, 3=Error)
log_level=1
