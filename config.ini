# RPI_MediaServer Configuration

# Video Mode 
# 1=MIXING_2X2, 
# 2=ONLY_HDMI, 
# 3=ONLY_CSI, 4=ONLY_USB, 5=ONLY_SCREEN_WAYLAND, 6=PIP_FB_RIGHT_TOP)
video_mode=1

# Input devices
hdmi_device=/dev/video0
csi_device=/dev/video1
usb_device=/dev/video0
fb_device=

# Wayland framebuffer snapshot settings
# Mode 5 captures a 1280x720 JPEG for the Screen menu
# 2x2 mode also reuses the same snapshot source for the FB slot
fb_width=1280
fb_height=720
framebuffer_snapshot_path=/tmp/framebuffer_latest.jpg
framebuffer_snapshot_interval_sec=5
framebuffer_snapshot_quality=7

# Output resolution
mix_width=320
mix_height=240
single_width=1280
single_height=720
fps=30
show_input_labels=true
show_wallclock_overlay=true

# Encoding
codec=libx264
mix_bitrate=2000000
single_bitrate=10000000
gop_size=15

# Streaming
rtsp_url=rtsp://10.1.119.31:8554/live
wf_recorder_path=/usr/bin/wf-recorder
wayland_display=wayland-0
xdg_runtime_dir=/run/user/1000

# AI Model
ai_model=/usr/share/hailo-models/yolov8s_person.hef
confidence_threshold=0.5

# Logging (0=Debug, 1=Info, 2=Warning, 3=Error)
log_level=1
